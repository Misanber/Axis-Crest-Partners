<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Axis Crest Partners</title>
  <style>
    :root{
      --navy:#081327;
      --gold:#c8a45c;
      --text-soft:#bac7da;
      --white:#ffffff;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      background:#081327;
      color:var(--white);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }

    .box{
      text-align:center;
      max-width:700px;
    }

    .code{
      font-size:88px;
      line-height:1;
      color:var(--gold);
      margin-bottom:14px;
      font-weight:700;
    }

    h1{
      font-size:42px;
      margin-bottom:12px;
    }

    p{
      color:var(--text-soft);
      font-size:18px;
      margin-bottom:24px;
    }

    a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:0 22px;
      border-radius:999px;
      background:var(--gold);
      color:#13233d;
      text-decoration:none;
      font-weight:600;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>
      The page you are looking for does not exist or may have been moved.
    </p>
    <a href="./index.html">Return to Homepage</a>
  </div>
</body>
</html>
