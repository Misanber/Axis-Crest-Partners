<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Axis Crest Partners</title>
  <style>
    :root{
      --navy:#081327;
      --gold:#c8a45c;
      --text-soft:#bac7da;
      --white:#ffffff;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      background:
        linear-gradient(rgba(8,19,39,0.90), rgba(8,19,39,0.96)),
        url("https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
      color:var(--white);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }

    .box{
      width:min(100%, 760px);
      padding:42px;
      border-radius:26px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      text-align:center;
      box-shadow:0 20px 44px rgba(0,0,0,0.18);
    }

    .eyebrow{
      display:inline-block;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,0.08);
      color:var(--gold);
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:18px;
    }

    h1{
      font-size:clamp(34px, 5vw, 52px);
      line-height:1.1;
      margin-bottom:16px;
    }

    p{
      color:var(--text-soft);
      font-size:18px;
      max-width:560px;
      margin:0 auto 28px;
    }

    .actions{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:14px;
    }

    .btn{
      min-height:48px;
      padding:0 22px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      font-weight:600;
    }

    .btn-primary{
      background:var(--gold);
      color:#13233d;
    }

    .btn-secondary{
      border:1px solid rgba(255,255,255,0.18);
      color:var(--white);
      background:rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="eyebrow">Thank You</div>
    <h1>Your message has been received</h1>
    <p>
      Thank you for contacting Axis Crest Partners. We will review your inquiry and revert shortly if there is relevant alignment.
    </p>
    <div class="actions">
      <a href="./index.html" class="btn btn-primary">Back to Website</a>
      <a href="./teaser/axis-crest-teaser.pdf" class="btn btn-secondary" target="_blank">Open Investor Teaser</a>
    </div>
  </div>
</body>
</html>
